<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Face Rating App</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 1px solid #333333;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .header p {
            color: #888888;
            font-size: 1.1em;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8em;
            margin: 10px 0;
        }

        .status-badge.ready {
            background: #00ff88;
            color: #000000;
        }

        .status-badge.loading {
            background: #ffff00;
            color: #000000;
        }

        .upload-area {
            border: 2px dashed #333333;
            border-radius: 10px;
            padding: 50px 20px;
            text-align: center;
            margin: 30px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #ffffff;
            background: #111111;
        }

        .upload-area p {
            color: #888888;
            font-size: 1.1em;
        }

        .upload-area input {
            display: none;
        }

        .image-container {
            margin: 30px 0;
            text-align: center;
        }

        .image-container img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 10px;
            border: 2px solid #333333;
            display: block;
            margin: 0 auto;
        }

        canvas {
            display: block;
            margin: 20px auto;
            max-width: 100%;
        }

        .results {
            margin-top: 30px;
            border: 1px solid #333333;
            border-radius: 10px;
            padding: 25px;
            display: none;
        }

        .results.active {
            display: block;
        }

        .psl-score {
            font-size: 4em;
            font-weight: 800;
            text-align: center;
            margin: 20px 0;
        }

        .psl-score.high {
            color: #00ff88;
        }

        .psl-score.medium {
            color: #ffff00;
        }

        .psl-score.low {
            color: #ff4444;
        }

        .metrics {
            margin-top: 20px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333333;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #888888;
        }

        .metric-value {
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .status {
            color: #888888;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .error {
            color: #ff4444;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .timeout-warning {
            color: #ffff00;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .debug-info {
            background: #111111;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.8em;
            color: #888888;
            max-height: 200px;
            overflow-y: auto;
        }

        .debug-info h4 {
            color: #ffffff;
            margin-bottom: 10px;
        }

        .debug-info p {
            margin-bottom: 5px;
        }

        .button {
            background: linear-gradient(90deg, #ffffff, #666666);
            border: none;
            color: #000000;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .button:hover {
            transform: scale(1.02);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PSL Face Rating</h1>
            <p>Upload a photo to get your PSL rating based on facial structure</p>
            <div class="status-badge" id="modelStatus">⏳ Loading models...</div>
        </div>

        <div class="upload-area" onclick="document.getElementById('photoInput').click()">
            <p>📷 Click to upload photo</p>
            <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoUpload(event)">
        </div>

        <div class="image-container" id="imageContainer" style="display: none;">
            <img id="uploadedImage" alt="Uploaded photo">
            <canvas id="canvas"></canvas>
        </div>

        <div class="loading" id="loading">
            <p>📸 Analyzing face...</p>
            <p class="status" id="status">Detecting face...</p>
            <p class="error" id="error"></p>
            <p class="timeout-warning" id="timeoutWarning"></p>
        </div>

        <div class="button-container" id="buttonContainer" style="display: none;">
            <button class="button" onclick="analyzeFace()">Analyze Face</button>
        </div>

        <div class="results" id="results">
            <div style="text-align: center;">
                <p style="color: #888888; font-size: 0.9em;">Your PSL Rating</p>
                <div class="psl-score" id="pslScore">0</div>
                <p id="pslLabel" style="color: #888888;"></p>
            </div>

            <div class="metrics" id="metrics">
                <!-- Metrics will be inserted here -->
            </div>

            <div class="button-container" style="margin-top: 30px;">
                <button class="button" onclick="reset()">Analyze Another</button>
            </div>
        </div>
    </div>

    <script>
        let currentImage = null;
        let displaySize = null;
        let modelsLoaded = false;
        let analysisTimeout = null;

        // Pre-load models when page loads
        window.addEventListener('load', async function() {
            await loadModels();
        });

        async function loadModels() {
            const statusBadge = document.getElementById('modelStatus');
            statusBadge.textContent = '⏳ Loading FaceAPI models...';
            statusBadge.className = 'status-badge loading';

            try {
                console.log('Starting to load models...');
                await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                console.log('TinyFaceDetector loaded');

                await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                console.log('FaceLandmark68Net loaded');

                await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                console.log('FaceRecognitionNet loaded');

                modelsLoaded = true;
                statusBadge.textContent = '✅ Models loaded!';
                statusBadge.className = 'status-badge ready';
            } catch (error) {
                console.error('Error loading models:', error);
                statusBadge.textContent = '❌ Failed to load models';
                statusBadge.className = 'status-badge';
                document.getElementById('error').textContent = 'Failed to load models. Please refresh the page.';
            }
        }

        async function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            console.log('File selected:', file.name);
            document.getElementById('error').textContent = '';
            document.getElementById('timeoutWarning').textContent = '';

            if (!modelsLoaded) {
                document.getElementById('error').textContent = 'Models not loaded yet. Please wait...';
                return;
            }

            const reader = new FileReader();
            reader.onload = async function(e) {
                console.log('Image loaded');
                currentImage = e.target.result;
                document.getElementById('uploadedImage').src = currentImage;
                document.getElementById('imageContainer').style.display = 'block';
                document.getElementById('buttonContainer').style.display = 'block';
                document.getElementById('results').classList.remove('active');
                document.getElementById('loading').classList.remove('active');

                // Set up canvas
                setupCanvas();
            };
            reader.onerror = function(error) {
                console.error('File reader error:', error);
                document.getElementById('error').textContent = 'Error loading image. Please try again.';
            };
            reader.readAsDataURL(file);
        }

        function setupCanvas() {
            const canvas = document.getElementById('canvas');
            const img = document.getElementById('uploadedImage');

            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');

            // Draw image on canvas
            ctx.drawImage(img, 0, 0);

            // Set display size
            displaySize = new faceapi.WithDimensions(img.width, img.height);
        }

        async function analyzeFace() {
            if (!currentImage) {
                console.error('No image loaded');
                return;
            }

            console.log('Starting face analysis...');
            document.getElementById('loading').classList.add('active');
            document.getElementById('buttonContainer').style.display = 'none';
            document.getElementById('status').textContent = 'Detecting face...';
            document.getElementById('error').textContent = '';
            document.getElementById('timeoutWarning').textContent = '';

            const startTime = performance.now();
            let detectionStarted = false;

            // Set timeout to prevent hanging
            analysisTimeout = setTimeout(() => {
                if (!detectionStarted) {
                    console.error('Analysis timeout - detection not started');
                    document.getElementById('timeoutWarning').textContent = 'Taking too long... The image might be too large.';
                    document.getElementById('loading').classList.remove('active');
                    document.getElementById('buttonContainer').style.display = 'block';
                }
            }, 30000); // 30 second timeout

            try {
                const img = new Image();
                img.src = currentImage;

                img.onload = async function() {
                    console.log('Image loaded for analysis, dimensions:', img.width, 'x', img.height);
                    detectionStarted = true;

                    // Set up display size
                    displaySize = new faceapi.WithDimensions(img.width, img.height);

                    document.getElementById('status').textContent = 'Detecting face...';
                    console.log('Starting face detection...');

                    const detections = await faceapi.detectAllFaces(img, new faceapi.TinyFaceDetectorOptions())
                        .withFaceLandmarks();

                    const detectionTime = performance.now();
                    console.log('Detection took:', (detectionTime - startTime).toFixed(0), 'ms');
                    console.log('Detections:', detections.length);

                    // Clear timeout
                    clearTimeout(analysisTimeout);

                    if (detections.length === 0) {
                        document.getElementById('status').textContent = 'No face detected';
                        document.getElementById('error').textContent = 'No face detected in the photo. Please upload a clear photo with a visible face.';
                        document.getElementById('loading').classList.remove('active');
                        document.getElementById('buttonContainer').style.display = 'block';
                        return;
                    }

                    console.log('Face detected, calculating metrics...');
                    const landmarks = detections[0].landmarks;

                    // Draw landmarks on canvas
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');

                    // Draw original image
                    ctx.drawImage(img, 0, 0);

                    // Draw landmarks
                    const detectionsWithSize = faceapi.resizeResults(detections, displaySize);
                    faceapi.draw.drawFaceLandmarks(canvas, detectionsWithSize);

                    // Check if landmarks have positions
                    if (!landmarks || !landmarks.positions) {
                        console.error('Landmarks.positions is undefined');
                        document.getElementById('status').textContent = 'Error processing landmarks';
                        document.getElementById('error').textContent = 'Error processing face landmarks. Please try a clearer photo.';
                        document.getElementById('loading').classList.remove('active');
                        document.getElementById('buttonContainer').style.display = 'block';
                        return;
                    }

                    const positions = landmarks.positions;
                    console.log('Positions length:', positions.length);

                    // Calculate metrics
                    const metrics = calculatePSLMetrics(landmarks);

                    // Display results
                    displayResults(metrics);

                    document.getElementById('loading').classList.remove('active');
                    console.log('Results displayed');

                };

                img.onerror = function(error) {
                    console.error('Image load error:', error);
                    clearTimeout(analysisTimeout);
                    document.getElementById('status').textContent = 'Error loading image';
                    document.getElementById('error').textContent = 'Error loading image for analysis. Please try again.';
                    document.getElementById('loading').classList.remove('active');
                    document.getElementById('buttonContainer').style.display = 'block';
                };

            } catch (error) {
                console.error('Error in analyzeFace:', error);
                console.error('Error stack:', error.stack);
                clearTimeout(analysisTimeout);
                document.getElementById('status').textContent = 'Error occurred';
                document.getElementById('error').textContent = error.message;
                document.getElementById('loading').classList.remove('active');
                document.getElementById('buttonContainer').style.display = 'block';
            }
        }

        function calculatePSLMetrics(landmarks) {
            const positions = landmarks.positions;

            console.log('=== Starting PSL Metrics Calculation ===');

            // Check if positions is an array
            if (!Array.isArray(positions)) {
                console.error('positions is not an array');
                return {
                    score: 0,
                    error: 'Invalid landmark data'
                };
            }

            // Check if we have enough landmarks
            if (positions.length < 68) {
                console.error('Not enough landmarks:', positions.length, 'expected 68');
                return {
                    score: 0,
                    error: 'Incomplete face detection'
                };
            }

            // Helper function to get coordinate safely
            const getCoord = (point, axis) => {
                if (!point || typeof point !== 'object') {
                    return null;
                }
                const coord = point[axis];
                if (typeof coord !== 'number' || isNaN(coord)) {
                    return null;
                }
                return coord;
            };

            // Face shape analysis
            const rightCheek = positions[29];
            const leftCheek = positions[20];
            const topOfHead = positions[8];
            const chin = positions[26];

            const rightX = getCoord(rightCheek, 'x');
            const leftX = getCoord(leftCheek, 'x');
            const topY = getCoord(topOfHead, 'y');
            const chinY = getCoord(chin, 'y');

            console.log('Right cheek:', rightCheek);
            console.log('Left cheek:', leftCheek);
            console.log('Top of head:', topOfHead);
            console.log('Chin:', chin);
            console.log('Right X:', rightX, 'Left X:', leftX);
            console.log('Top Y:', topY, 'Chin Y:', chinY);

            if (rightX === null || leftX === null || topY === null || chinY === null) {
                console.error('Missing coordinate data');
                console.error('Right cheek:', rightCheek);
                console.error('Left cheek:', leftCheek);
                console.error('Top of head:', topOfHead);
                console.error('Chin:', chin);
                return {
                    score: 50,
                    error: 'Missing coordinate data',
                    metrics: {
                        faceRatio: 'N/A',
                        foreheadRatio: 'N/A',
                        jawRatio: 'N/A',
                        noseRatio: 'N/A',
                        eyeDistance: 'N/A'
                    }
                };
            }

            const faceWidth = rightX - leftX;
            const faceHeight = topY - chinY;

            console.log('Face width:', faceWidth, 'Face height:', faceHeight);

            if (faceWidth <= 0 || faceHeight <= 0) {
                console.error('Invalid face dimensions:', faceWidth, faceHeight);
                return {
                    score: 50,
                    error: 'Invalid face dimensions',
                    metrics: {
                        faceRatio: 'N/A',
                        foreheadRatio: 'N/A',
                        jawRatio: 'N/A',
                        noseRatio: 'N/A',
                        eyeDistance: 'N/A'
                    }
                };
            }

            // Forehead width
            const foreheadWidth = (getCoord(positions[12], 'x') || 0) - (getCoord(positions[9], 'x') || 0);

            // Jawline width
            const jawWidth = (getCoord(positions[14], 'x') || 0) - (getCoord(positions[1], 'x') || 0);

            // Nose width
            const noseWidth = (getCoord(positions[35], 'x') || 0) - (getCoord(positions[31], 'x') || 0);

            // Eye distance
            const eyeDistance = (getCoord(positions[39], 'x') || 0) - (getCoord(positions[36], 'x') || 0);

            console.log('Face width:', faceWidth, 'Face height:', faceHeight);
            console.log('Forehead width:', foreheadWidth);
            console.log('Jaw width:', jawWidth);
            console.log('Nose width:', noseWidth);
            console.log('Eye distance:', eyeDistance);

            // Calculate shape metrics
            const faceRatio = faceWidth / faceHeight;
            const foreheadRatio = foreheadWidth / faceWidth;
            const jawRatio = jawWidth / faceWidth;
            const noseRatio = noseWidth / faceWidth;

            console.log('Face ratio:', faceRatio);
            console.log('Forehead ratio:', foreheadRatio);
            console.log('Jaw ratio:', jawRatio);
            console.log('Nose ratio:', noseRatio);
            console.log('Eye distance:', eyeDistance);

            // PSL Score calculation (0-100)
            let pslScore = 50;

            // Face shape scoring
            if (faceRatio > 0.6) {
                pslScore += 5;
                console.log('Wide face bonus: +5');
            } else if (faceRatio < 0.45) {
                pslScore += 3;
                console.log('Narrow face bonus: +3');
            } else {
                console.log('Average face shape: 0');
            }

            // Forehead scoring
            if (foreheadRatio > 0.3) {
                pslScore += 3;
                console.log('High forehead bonus: +3');
            } else if (foreheadRatio < 0.25) {
                pslScore += 2;
                console.log('Low forehead bonus: +2');
            } else {
                console.log('Average forehead: 0');
            }

            // Jawline scoring
            if (jawRatio > 0.38) {
                pslScore += 5;
                console.log('Defined jaw bonus: +5');
            } else if (jawRatio < 0.32) {
                pslScore -= 2;
                console.log('Weak jaw penalty: -2');
            } else {
                console.log('Average jawline: 0');
            }

            // Nose scoring
            if (noseRatio > 0.08) {
                pslScore += 3;
                console.log('Defined nose bonus: +3');
            } else if (noseRatio < 0.06) {
                pslScore -= 1;
                console.log('Small nose penalty: -1');
            } else {
                console.log('Average nose: 0');
            }

            // Eye spacing scoring
            if (eyeDistance > faceWidth * 0.18) {
                pslScore += 2;
                console.log('Wide eyes bonus: +2');
            } else if (eyeDistance < faceWidth * 0.12) {
                pslScore -= 1;
                console.log('Close-set eyes penalty: -1');
            } else {
                console.log('Average eye spacing: 0');
            }

            // Apply limits
            pslScore = Math.max(0, Math.min(100, pslScore));

            console.log('PSL Score:', pslScore);

            return {
                score: pslScore,
                faceRatio: faceRatio.toFixed(2),
                foreheadRatio: foreheadRatio.toFixed(2),
                jawRatio: jawRatio.toFixed(2),
                noseRatio: noseRatio.toFixed(2),
                eyeDistance: eyeDistance.toFixed(1),
                faceWidth: faceWidth.toFixed(0),
                faceHeight: faceHeight.toFixed(0)
            };
        }

        function displayResults(metrics) {
            const resultsDiv = document.getElementById('results');
            const pslScoreDiv = document.getElementById('pslScore');
            const pslLabelDiv = document.getElementById('pslLabel');
            const metricsDiv = document.getElementById('metrics');

            pslScoreDiv.textContent = metrics.score;

            pslScoreDiv.className = 'psl-score';
            if (metrics.score >= 80) {
                pslScoreDiv.classList.add('high');
                pslLabelDiv.textContent = 'High PSL Rating!';
            } else if (metrics.score >= 60) {
                pslScoreDiv.classList.add('medium');
                pslLabelDiv.textContent = 'Good PSL Rating';
            } else {
                pslScoreDiv.classList.add('low');
                pslLabelDiv.textContent = 'Average PSL Rating';
            }

            metricsDiv.innerHTML = `
                <div class="metric">
                    <span class="metric-label">Face Shape Ratio</span>
                    <span class="metric-value">${metrics.faceRatio || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Forehead Width</span>
                    <span class="metric-value">${metrics.foreheadRatio || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Jawline Width</span>
                    <span class="metric-value">${metrics.jawRatio || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Nose Width</span>
                    <span class="metric-value">${metrics.noseRatio || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Eye Distance</span>
                    <span class="metric-value">${metrics.eyeDistance || 'N/A'}</span>
                </div>
            `;

            resultsDiv.classList.add('active');
        }

        function reset() {
            currentImage = null;
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            document.getElementById('imageContainer').style.display = 'none';
            document.getElementById('buttonContainer').style.display = 'block';
            document.getElementById('results').classList.remove('active');
            document.getElementById('loading').classList.remove('active');
            document.getElementById('photoInput').value = '';
            document.getElementById('error').textContent = '';
            document.getElementById('timeoutWarning').textContent = '';
            console.log('Reset complete');
        }
    </script>
</body>
</html>
