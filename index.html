<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Face Rating App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 1px solid #333333;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .header p {
            color: #888888;
            font-size: 1.1em;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8em;
            margin: 10px 0;
        }

        .status-badge.ready {
            background: #00ff88;
            color: #000000;
        }

        .status-badge.loading {
            background: #ffff00;
            color: #000000;
        }

        .status-badge.error {
            background: #ff4444;
            color: #ffffff;
        }

        .upload-area {
            border: 2px dashed #333333;
            border-radius: 10px;
            padding: 50px 20px;
            text-align: center;
            margin: 30px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #ffffff;
            background: #111111;
        }

        .upload-area p {
            color: #888888;
            font-size: 1.1em;
        }

        .upload-area input {
            display: none;
        }

        .image-container {
            margin: 30px 0;
            text-align: center;
        }

        .image-container img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 10px;
            border: 2px solid #333333;
            display: block;
            margin: 0 auto;
        }

        canvas {
            display: block;
            margin: 20px auto;
            max-width: 100%;
        }

        .results {
            margin-top: 30px;
            border: 1px solid #333333;
            border-radius: 10px;
            padding: 25px;
            display: none;
        }

        .results.active {
            display: block;
        }

        .psl-score {
            font-size: 4em;
            font-weight: 800;
            text-align: center;
            margin: 20px 0;
        }

        .psl-score.high {
            color: #00ff88;
        }

        .psl-score.medium {
            color: #ffff00;
        }

        .psl-score.low {
            color: #ff4444;
        }

        .metrics {
            margin-top: 20px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333333;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #888888;
        }

        .metric-value {
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .status {
            color: #888888;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .error {
            color: #ff4444;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .timeout-warning {
            color: #ffff00;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .button {
            background: linear-gradient(90deg, #ffffff, #666666);
            border: none;
            color: #000000;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .button:hover {
            transform: scale(1.02);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PSL Face Rating</h1>
            <p>Upload a photo to get your PSL rating based on facial structure</p>
            <div class="status-badge" id="modelStatus">⏳ Initializing...</div>
        </div>

        <div class="upload-area" onclick="document.getElementById('photoInput').click()">
            <p>📷 Click to upload photo</p>
            <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoUpload(event)">
        </div>

        <div class="image-container" id="imageContainer" style="display: none;">
            <img id="uploadedImage" alt="Uploaded photo">
            <canvas id="canvas"></canvas>
        </div>

        <div class="loading" id="loading">
            <p>📸 Analyzing face...</p>
            <p class="status" id="status">Detecting face...</p>
            <p class="error" id="error"></p>
            <p class="timeout-warning" id="timeoutWarning"></p>
        </div>

        <div class="button-container" id="buttonContainer" style="display: none;">
            <button class="button" onclick="analyzeFace()">Analyze Face</button>
        </div>

        <div class="results" id="results">
            <div style="text-align: center;">
                <p style="color: #888888; font-size: 0.9em;">Your PSL Rating</p>
                <div class="psl-score" id="pslScore">0</div>
                <p id="pslLabel" style="color: #888888;"></p>
            </div>

            <div class="metrics" id="metrics">
                <!-- Metrics will be inserted here -->
            </div>

            <div class="button-container" style="margin-top: 30px;">
                <button class="button" onclick="reset()">Analyze Another</button>
            </div>
        </div>
    </div>

    <script>
        let currentImage = null;
        let displaySize = null;
        const API_URL = 'https://api.facedefect.io/detect';

        async function initialize() {
            const statusBadge = document.getElementById('modelStatus');
            statusBadge.textContent = '⏳ Checking API...';
            statusBadge.className = 'status-badge loading';

            try {
                // Check if API is accessible
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        image: 'data:image/jpeg;base64,placeholder'
                    })
                });

                if (response.ok) {
                    statusBadge.textContent = '✅ API Ready';
                    statusBadge.className = 'status-badge ready';
                } else {
                    throw new Error('API returned error: ' + response.status);
                }
            } catch (error) {
                console.error('API Error:', error);
                statusBadge.textContent = '❌ API Failed';
                statusBadge.className = 'status-badge error';
                document.getElementById('error').textContent = 'API not available. Try again later.';
            }
        }

        async function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            console.log('File selected:', file.name);
            document.getElementById('error').textContent = '';
            document.getElementById('timeoutWarning').textContent = '';

            const statusBadge = document.getElementById('modelStatus');
            if (statusBadge.className.includes('error')) {
                document.getElementById('error').textContent = 'API is not available. Please try again later.';
                return;
            }

            const reader = new FileReader();
            reader.onload = async function(e) {
                console.log('Image loaded');
                currentImage = e.target.result;
                document.getElementById('uploadedImage').src = currentImage;
                document.getElementById('imageContainer').style.display = 'block';
                document.getElementById('buttonContainer').style.display = 'block';
                document.getElementById('results').classList.remove('active');
                document.getElementById('loading').classList.remove('active');

                setupCanvas();
            };
            reader.onerror = function(error) {
                console.error('File reader error:', error);
                document.getElementById('error').textContent = 'Error loading image. Please try again.';
            };
            reader.readAsDataURL(file);
        }

        function setupCanvas() {
            const canvas = document.getElementById('canvas');
            const img = document.getElementById('uploadedImage');

            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');

            ctx.drawImage(img, 0, 0);
            displaySize = new faceapi.WithDimensions(img.width, img.height);
        }

        async function analyzeFace() {
            if (!currentImage) {
                console.error('No image loaded');
                return;
            }

            console.log('Starting face analysis...');
            document.getElementById('loading').classList.add('active');
            document.getElementById('buttonContainer').style.display = 'none';
            document.getElementById('status').textContent = 'Detecting face...';
            document.getElementById('error').textContent = '';
            document.getElementById('timeoutWarning').textContent = '';

            const startTime = performance.now();

            setTimeout(() => {
                if (performance.now() - startTime < 35000) {
                    document.getElementById('timeoutWarning').textContent = 'Taking too long. The API might be slow.';
                    document.getElementById('loading').classList.remove('active');
                    document.getElementById('buttonContainer').style.display = 'block';
                }
            }, 35000);

            try {
                const img = new Image();
                img.src = currentImage;

                img.onload = async function() {
                    console.log('Image loaded, dimensions:', img.width, 'x', img.height);

                    // Resize if too large
                    const maxSize = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > maxSize || height > maxSize) {
                        console.log('Resizing image...');
                        if (width > height) {
                            height = Math.round(height * (maxSize / width));
                            width = maxSize;
                        } else {
                            width = Math.round(width * (maxSize / height));
                            height = maxSize;
                        }
                    }

                    const resizedCanvas = document.createElement('canvas');
                    resizedCanvas.width = width;
                    resizedCanvas.height = height;
                    const resizedCtx = resizedCanvas.getContext('2d');
                    resizedCtx.drawImage(img, 0, 0, width, height);

                    document.getElementById('status').textContent = 'Detecting face...';
                    console.log('Sending to API...');

                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            image: resizedCanvas.toDataURL('image/jpeg', 0.8)
                        })
                    });

                    if (!response.ok) {
                        throw new Error('API error: ' + response.status);
                    }

                    const data = await response.json();
                    const detectionTime = performance.now();

                    console.log('Detection took:', (detectionTime - startTime).toFixed(0), 'ms');
                    console.log('API response:', data);

                    if (!data.faces || data.faces.length === 0) {
                        document.getElementById('status').textContent = 'No face detected';
                        document.getElementById('error').textContent = 'No face detected in the photo. Please upload a clearer photo.';
                        document.getElementById('loading').classList.remove('active');
                        document.getElementById('buttonContainer').style.display = 'block';
                        return;
                    }

                    const face = data.faces[0];
                    console.log('Face detected:', face);

                    // Calculate metrics from API response
                    const metrics = calculatePSLMetricsFromAPI(face, width, height);

                    // Draw simple face outline
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');

                    ctx.drawImage(img, 0, 0);

                    if (face.boundingBox) {
                        const scale = img.width / width;
                        const box = face.boundingBox;
                        const scaledBox = {
                            left: box.left * scale,
                            top: box.top * scale,
                            width: box.width * scale,
                            height: box.height * scale
                        };

                        ctx.strokeStyle = '#00ff88';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(
                            scaledBox.left,
                            scaledBox.top,
                            scaledBox.width,
                            scaledBox.height
                        );
                    }

                    displayResults(metrics);

                    document.getElementById('loading').classList.remove('active');

                };

                img.onerror = function(error) {
                    console.error('Image load error:', error);
                    document.getElementById('status').textContent = 'Error loading image';
                    document.getElementById('error').textContent = 'Error loading image for analysis.';
                    document.getElementById('loading').classList.remove('active');
                    document.getElementById('buttonContainer').style.display = 'block';
                };

            } catch (error) {
                console.error('Error in analyzeFace:', error);
                document.getElementById('status').textContent = 'Error occurred';
                document.getElementById('error').textContent = error.message;
                document.getElementById('loading').classList.remove('active');
                document.getElementById('buttonContainer').style.display = 'block';
            }
        }

        function calculatePSLMetricsFromAPI(face, originalWidth, originalHeight) {
            // If API provides face dimensions, use them
            if (face.boundingBox && face.boundingBox.width > 0 && face.boundingBox.height > 0) {
                const faceWidth = face.boundingBox.width;
                const faceHeight = face.boundingBox.height;
                const faceRatio = faceWidth / faceHeight;

                // Forehead ratio (estimate from top/bottom center)
                const topY = face.boundingBox.top;
                const bottomY = face.boundingBox.top + face.boundingBox.height;
                const foreheadRatio = (topY / bottomY);

                // Jawline ratio (estimate from width)
                const jawRatio = (face.boundingBox.width / originalWidth);

                // Nose width (estimate from features if available)
                const noseWidth = (face.boundingBox.width * 0.15);

                // Eye distance (estimate)
                const eyeDistance = (face.boundingBox.width * 0.2);

                let pslScore = 50;

                // Base score adjustments
                if (faceRatio > 0.5) pslScore += 3; // More balanced faces
                if (foreheadRatio > 0.35) pslScore += 2; // Good forehead proportion

                pslScore = Math.max(0, Math.min(100, pslScore));

                return {
                    score: pslScore,
                    faceRatio: faceRatio.toFixed(2),
                    foreheadRatio: foreheadRatio.toFixed(2),
                    jawRatio: jawRatio.toFixed(2),
                    noseRatio: (noseWidth / faceWidth).toFixed(2),
                    eyeDistance: eyeDistance.toFixed(1)
                };
            }

            // Fallback if API doesn't provide dimensions
            return {
                score: 50,
                faceRatio: 'N/A',
                foreheadRatio: 'N/A',
                jawRatio: 'N/A',
                noseRatio: 'N/A',
                eyeDistance: 'N/A'
            };
        }

        function displayResults(metrics) {
            const resultsDiv = document.getElementById('results');
            const pslScoreDiv = document.getElementById('pslScore');
            const pslLabelDiv = document.getElementById('pslLabel');
            const metricsDiv = document.getElementById('metrics');

            pslScoreDiv.textContent = metrics.score;

            pslScoreDiv.className = 'psl-score';
            if (metrics.score >= 80) {
                pslScoreDiv.classList.add('high');
                pslLabelDiv.textContent = 'High PSL Rating!';
            } else if (metrics.score >= 60) {
                pslScoreDiv.classList.add('medium');
                pslLabelDiv.textContent = 'Good PSL Rating';
            } else {
                pslScoreDiv.classList.add('low');
                pslLabelDiv.textContent = 'Average PSL Rating';
            }

            metricsDiv.innerHTML = `
                <div class="metric">
                    <span class="metric-label">Face Shape Ratio</span>
                    <span class="metric-value">${metrics.faceRatio || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Forehead Width</span>
                    <span class="metric-value">${metrics.foreheadRatio || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Jawline Width</span>
                    <span class="metric-value">${metrics.jawRatio || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Nose Width</span>
                    <span class="metric-value">${metrics.noseRatio || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Eye Distance</span>
                    <span class="metric-value">${metrics.eyeDistance || 'N/A'}</span>
                </div>
            `;

            resultsDiv.classList.add('active');
        }

        function reset() {
            currentImage = null;
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            document.getElementById('imageContainer').style.display = 'none';
            document.getElementById('buttonContainer').style.display = 'block';
            document.getElementById('results').classList.remove('active');
            document.getElementById('loading').classList.remove('active');
            document.getElementById('photoInput').value = '';
            document.getElementById('error').textContent = '';
            document.getElementById('timeoutWarning').textContent = '';
        }

        // Initialize on load
        initialize();
    </script>
</body>
</html>
