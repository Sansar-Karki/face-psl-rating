<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Face Rating App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 1px solid #333333;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .header p {
            color: #888888;
            font-size: 1.1em;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8em;
            margin: 10px 0;
        }

        .status-badge.ready {
            background: #00ff88;
            color: #000000;
        }

        .status-badge.loading {
            background: #ffff00;
            color: #000000;
        }

        .status-badge.error {
            background: #ff4444;
            color: #ffffff;
        }

        .upload-area {
            border: 2px dashed #333333;
            border-radius: 10px;
            padding: 50px 20px;
            text-align: center;
            margin: 30px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #ffffff;
            background: #111111;
        }

        .upload-area p {
            color: #888888;
            font-size: 1.1em;
        }

        .upload-area input {
            display: none;
        }

        .image-container {
            margin: 30px 0;
            text-align: center;
        }

        .image-container img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 10px;
            border: 2px solid #333333;
            display: block;
            margin: 0 auto;
        }

        canvas {
            display: block;
            margin: 20px auto;
            max-width: 100%;
        }

        .results {
            margin-top: 30px;
            border: 1px solid #333333;
            border-radius: 10px;
            padding: 25px;
            display: none;
        }

        .results.active {
            display: block;
        }

        .psl-score {
            font-size: 4em;
            font-weight: 800;
            text-align: center;
            margin: 20px 0;
        }

        .psl-score.high {
            color: #00ff88;
        }

        .psl-score.medium {
            color: #ffff00;
        }

        .psl-score.low {
            color: #ff4444;
        }

        .metrics {
            margin-top: 20px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333333;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #888888;
        }

        .metric-value {
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .status {
            color: #888888;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .error {
            color: #ff4444;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .timeout-warning {
            color: #ffff00;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .button {
            background: linear-gradient(90deg, #ffffff, #666666);
            border: none;
            color: #000000;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .button:hover {
            transform: scale(1.02);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PSL Face Rating</h1>
            <p>Upload a photo to get your PSL rating based on facial structure</p>
            <div class="status-badge" id="modelStatus">⏳ Loading models...</div>
        </div>

        <div class="upload-area" onclick="document.getElementById('photoInput').click()">
            <p>📷 Click to upload photo</p>
            <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoUpload(event)">
        </div>

        <div class="image-container" id="imageContainer" style="display: none;">
            <img id="uploadedImage" alt="Uploaded photo">
            <canvas id="canvas"></canvas>
        </div>

        <div class="loading" id="loading">
            <p>📸 Analyzing face...</p>
            <p class="status" id="status">Detecting face...</p>
            <p class="error" id="error"></p>
            <p class="timeout-warning" id="timeoutWarning"></p>
        </div>

        <div class="button-container" id="buttonContainer" style="display: none;">
            <button class="button" onclick="analyzeFace()">Analyze Face</button>
        </div>

        <div class="results" id="results">
            <div style="text-align: center;">
                <p style="color: #888888; font-size: 0.9em;">Your PSL Rating</p>
                <div class="psl-score" id="pslScore">0</div>
                <p id="pslLabel" style="color: #888888;"></p>
            </div>

            <div class="metrics" id="metrics">
                <!-- Metrics will be inserted here -->
            </div>

            <div class="button-container" style="margin-top: 30px;">
                <button class="button" onclick="reset()">Analyze Another</button>
            </div>
        </div>
    </div>

    <script>
        let currentImage = null;
        let displaySize = null;
        let modelsLoaded = false;
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';

        // Pre-load models
        window.addEventListener('load', async function() {
            await loadModels();
        });

        async function loadModels() {
            const statusBadge = document.getElementById('modelStatus');
            statusBadge.textContent = '⏳ Loading models...';
            statusBadge.className = 'status-badge loading';

            try {
                console.log('Loading face-api from:', MODEL_URL);

                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                console.log('TinyFaceDetector loaded');

                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                console.log('FaceLandmark68Net loaded');

                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                console.log('FaceRecognitionNet loaded');

                modelsLoaded = true;
                statusBadge.textContent = '✅ Models loaded!';
                statusBadge.className = 'status-badge ready';
            } catch (error) {
                console.error('Error loading models:', error);
                statusBadge.textContent = '❌ Failed to load';
                statusBadge.className = 'status-badge error';
                document.getElementById('error').textContent = 'Failed to load face-api models. Check your internet connection.';
            }
        }

        async function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            console.log('File selected:', file.name);
            document.getElementById('error').textContent = '';
            document.getElementById('timeoutWarning').textContent = '';

            if (!modelsLoaded) {
                document.getElementById('error').textContent = 'Models still loading... Please wait.';
                return;
            }

            const reader = new FileReader();
            reader.onload = async function(e) {
                console.log('Image loaded');
                currentImage = e.target.result;
                document.getElementById('uploadedImage').src = currentImage;
                document.getElementById('imageContainer').style.display = 'block';
                document.getElementById('buttonContainer').style.display = 'block';
                document.getElementById('results').classList.remove('active');
                document.getElementById('loading').classList.remove('active');

                setupCanvas();
            };
            reader.onerror = function(error) {
                console.error('File reader error:', error);
                document.getElementById('error').textContent = 'Error loading image. Please try again.';
            };
            reader.readAsDataURL(file);
        }

        function setupCanvas() {
            const canvas = document.getElementById('canvas');
            const img = document.getElementById('uploadedImage');

            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');

            ctx.drawImage(img, 0, 0);
            displaySize = new faceapi.WithDimensions(img.width, img.height);
        }

        async function analyzeFace() {
            if (!currentImage) {
                console.error('No image loaded');
                return;
            }

            console.log('Starting face analysis...');
            document.getElementById('loading').classList.add('active');
            document.getElementById('buttonContainer').style.display = 'none';
            document.getElementById('status').textContent = 'Detecting face...';
            document.getElementById('error').textContent = '';
            document.getElementById('timeoutWarning').textContent = '';

            const startTime = performance.now();

            setTimeout(() => {
                if (performance.now() - startTime < 20000) {
                    console.error('Analysis timeout');
                    document.getElementById('timeoutWarning').textContent = 'Taking too long. Try a smaller photo.';
                    document.getElementById('loading').classList.remove('active');
                    document.getElementById('buttonContainer').style.display = 'block';
                }
            }, 20000);

            try {
                const img = new Image();
                img.src = currentImage;

                img.onload = async function() {
                    console.log('Image loaded, dimensions:', img.width, 'x', img.height);

                    // Resize if too large
                    const maxSize = 640;
                    let width = img.width;
                    let height = img.height;

                    if (width > maxSize || height > maxSize) {
                        console.log('Resizing image...');
                        if (width > height) {
                            height = Math.round(height * (maxSize / width));
                            width = maxSize;
                        } else {
                            width = Math.round(width * (maxSize / height));
                            height = maxSize;
                        }
                    }

                    const resizedCanvas = document.createElement('canvas');
                    resizedCanvas.width = width;
                    resizedCanvas.height = height;
                    const resizedCtx = resizedCanvas.getContext('2d');
                    resizedCtx.drawImage(img, 0, 0, width, height);

                    document.getElementById('status').textContent = 'Detecting face...';
                    console.log('Starting face detection...');

                    const detections = await faceapi.detectAllFaces(resizedCanvas, new faceapi.TinyFaceDetectorOptions())
                        .withFaceLandmarks();

                    const detectionTime = performance.now();
                    console.log('Detection took:', (detectionTime - startTime).toFixed(0), 'ms');
                    console.log('Detections:', detections.length);

                    if (detections.length === 0) {
                        document.getElementById('status').textContent = 'No face detected';
                        document.getElementById('error').textContent = 'No face detected in the photo. Please upload a clearer photo.';
                        document.getElementById('loading').classList.remove('active');
                        document.getElementById('buttonContainer').style.display = 'block';
                        return;
                    }

                    console.log('Face detected, calculating metrics...');
                    const landmarks = detections[0].landmarks;

                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');

                    ctx.drawImage(img, 0, 0);

                    const detectionsWithSize = faceapi.resizeResults(detections, displaySize);
                    faceapi.draw.drawFaceLandmarks(canvas, detectionsWithSize);

                    const metrics = calculatePSLMetrics(landmarks);
                    displayResults(metrics);

                    document.getElementById('loading').classList.remove('active');

                };

                img.onerror = function(error) {
                    console.error('Image load error:', error);
                    document.getElementById('status').textContent = 'Error loading image';
                    document.getElementById('error').textContent = 'Error loading image.';
                    document.getElementById('loading').classList.remove('active');
                    document.getElementById('buttonContainer').style.display = 'block';
                };

            } catch (error) {
                console.error('Error in analyzeFace:', error);
                document.getElementById('status').textContent = 'Error occurred';
                document.getElementById('error').textContent = error.message;
                document.getElementById('loading').classList.remove('active');
                document.getElementById('buttonContainer').style.display = 'block';
            }
        }

        function calculatePSLMetrics(landmarks) {
            const positions = landmarks.positions;

            if (!Array.isArray(positions)) {
                return {
                    score: 50,
                    error: 'Invalid landmark data'
                };
            }

            if (positions.length < 68) {
                return {
                    score: 50,
                    error: 'Incomplete face detection'
                };
            }

            const getCoord = (point, axis) => {
                if (!point || typeof point !== 'object') return null;
                const coord = point[axis];
                if (typeof coord !== 'number' || isNaN(coord)) return null;
                return coord;
            };

            const rightCheek = positions[29];
            const leftCheek = positions[20];
            const topOfHead = positions[8];
            const chin = positions[26];

            const rightX = getCoord(rightCheek, 'x');
            const leftX = getCoord(leftCheek, 'x');
            const topY = getCoord(topOfHead, 'y');
            const chinY = getCoord(chin, 'y');

            if (rightX === null || leftX === null || topY === null || chinY === null) {
                return {
                    score: 50,
                    error: 'Missing coordinate data'
                };
            }

            const faceWidth = rightX - leftX;
            const faceHeight = topY - chinY;

            if (faceWidth <= 0 || faceHeight <= 0) {
                return {
                    score: 50,
                    error: 'Invalid face dimensions'
                };
            }

            const foreheadWidth = (getCoord(positions[12], 'x') || 0) - (getCoord(positions[9], 'x') || 0);
            const jawWidth = (getCoord(positions[14], 'x') || 0) - (getCoord(positions[1], 'x') || 0);
            const noseWidth = (getCoord(positions[35], 'x') || 0) - (getCoord(positions[31], 'x') || 0);
            const eyeDistance = (getCoord(positions[39], 'x') || 0) - (getCoord(positions[36], 'x') || 0);

            const faceRatio = faceWidth / faceHeight;
            const foreheadRatio = foreheadWidth / faceWidth;
            const jawRatio = jawWidth / faceWidth;
            const noseRatio = noseWidth / faceWidth;

            let pslScore = 50;

            if (faceRatio > 0.6) {
                pslScore += 5;
            } else if (faceRatio < 0.45) {
                pslScore += 3;
            }

            if (foreheadRatio > 0.3) {
                pslScore += 3;
            } else if (foreheadRatio < 0.25) {
                pslScore += 2;
            }

            if (jawRatio > 0.38) {
                pslScore += 5;
            } else if (jawRatio < 0.32) {
                pslScore -= 2;
            }

            if (noseRatio > 0.08) {
                pslScore += 3;
            } else if (noseRatio < 0.06) {
                pslScore -= 1;
            }

            if (eyeDistance > faceWidth * 0.18) {
                pslScore += 2;
            } else if (eyeDistance < faceWidth * 0.12) {
                pslScore -= 1;
            }

            pslScore = Math.max(0, Math.min(100, pslScore));

            return {
                score: pslScore,
                faceRatio: faceRatio.toFixed(2),
                foreheadRatio: foreheadRatio.toFixed(2),
                jawRatio: jawRatio.toFixed(2),
                noseRatio: noseRatio.toFixed(2),
                eyeDistance: eyeDistance.toFixed(1)
            };
        }

        function displayResults(metrics) {
            const resultsDiv = document.getElementById('results');
            const pslScoreDiv = document.getElementById('pslScore');
            const pslLabelDiv = document.getElementById('pslLabel');
            const metricsDiv = document.getElementById('metrics');

            pslScoreDiv.textContent = metrics.score;

            pslScoreDiv.className = 'psl-score';
            if (metrics.score >= 80) {
                pslScoreDiv.classList.add('high');
                pslLabelDiv.textContent = 'High PSL Rating!';
            } else if (metrics.score >= 60) {
                pslScoreDiv.classList.add('medium');
                pslLabelDiv.textContent = 'Good PSL Rating';
            } else {
                pslScoreDiv.classList.add('low');
                pslLabelDiv.textContent = 'Average PSL Rating';
            }

            metricsDiv.innerHTML = `
                <div class="metric">
                    <span class="metric-label">Face Shape Ratio</span>
                    <span class="metric-value">${metrics.faceRatio || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Forehead Width</span>
                    <span class="metric-value">${metrics.foreheadRatio || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Jawline Width</span>
                    <span class="metric-value">${metrics.jawRatio || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Nose Width</span>
                    <span class="metric-value">${metrics.noseRatio || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Eye Distance</span>
                    <span class="metric-value">${metrics.eyeDistance || 'N/A'}</span>
                </div>
            `;

            resultsDiv.classList.add('active');
        }

        function reset() {
            currentImage = null;
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            document.getElementById('imageContainer').style.display = 'none';
            document.getElementById('buttonContainer').style.display = 'block';
            document.getElementById('results').classList.remove('active');
            document.getElementById('loading').classList.remove('active');
            document.getElementById('photoInput').value = '';
            document.getElementById('error').textContent = '';
            document.getElementById('timeoutWarning').textContent = '';
        }
    </script>
</body>
</html>
